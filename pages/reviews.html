<body>
    <!-- Directory Links -->
     <div class="directory-links">

    <!-- Heading -->
    <h1 style="text-align: center;">Leave a Review</h1>

    <p style="text-align: center; font-size: 14px; font-style: italic;">I'd love to hear what you think about my recipe collection! ♡</p>

    <div class="container" style="text-align: center; margin-top: 5px;font-size: 13px;">
        <input type="text" id="reviewerName" placeholder="Your Name">

        <textarea
        id="reviewText"
        placeholder="Share your thoughts about the recipes..."
        ></textarea>

        <!-- This is a vision of what I am trying to make in this page. I'll go back to this and improve this page once I have knowledge in JavaScript. I still don't have an idea about coding this so I used help from ChatGPT for now on scripting to make this section possible. Thank you, ChatGPT!-->

        <button onclick="submitReview()">Post Review</button>
    </div>

<div class="intro-container" style="text-align: left; margin-top: 5px;font-size: 13px; margin">
<h2>Reviews</h2></div>

<div id="reviewsList"></div>

<script>

let reviews = [];

function submitReview() {
    const name = document.getElementById('reviewerName').value;
    const review = document.getElementById('reviewText').value;

    if (name && review) {
        reviews.unshift({
            name,
            review,
            createdAt: new Date().toLocaleString()
        });

        document.getElementById('reviewerName').value = '';
        document.getElementById('reviewText').value = '';

        displayReviews();
    }
}

function displayReviews() {
    const reviewsList = document.getElementById('reviewsList');
    reviewsList.innerHTML = '';

    reviews.forEach(item => {
        const reviewDiv = document.createElement('div');

        reviewDiv.className = 'review-card';

        reviewDiv.innerHTML = `
            <h3>${item.name}</h3>
            <p>${item.review}</p>
            <small>${item.createdAt}</small>
        `;

        reviewsList.appendChild(reviewDiv);
    });
}

</script>
